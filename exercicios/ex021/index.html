<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de Caixas</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <style>
        h1{
            background-color:aliceblue;
            height: 300px;
            width: 300px;

            border-width: 10px;
            border-style: solid;
            border-color:aquamarine;

            /* Simplificação de bordas
            border: 10px solid aquamarine; */

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;

            /* Simplificação de padding
            padding: 10px 10px 10px 10px;
            OBS: se as 4 bordas for iguais pode usar apenas uma informação de px. Por exemplo
            padding: 10px; */

            margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 40px;
            margin-left: 20px;

            /* Simplificação de margin
            margin: 20px 20px 40px 20px;
            ou caso queira centralizar a caixa
            margin: 20px auto 20px auto; */ 

            outline-width: 9px;
            outline-style: dashed;
            outline-color: blue;

            /*Simplificando o outline
            outline: 9px dashed blue; */
        }

        a {
            border-width: 10px;
            border-style: solid;
            border-color: aqua;
            
            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona</p>
</body>
</html>
